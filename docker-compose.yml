version: "3.7"

services:
  gamedaybot:
    # Do not set user: — entrypoint must run as root to chown + setpriv to PUID/PGID.
    build:
      context: .
    restart: always
    ports:
      - 3010:8000
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./config.json:/app/config/config.json
      - ./data:/app/data
