<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Hades II Run Tracker</title>
        <link rel="stylesheet" href="/static/styles.css">
    </head>
    <body>
        <header class="hero">
            <p class="eyebrow">House of Hades</p>
            <h1>Hades II Run Tracker</h1>
            <p>
                Track your friends' successful topside and bottomside runs,
                then compare the carnage side by side.
            </p>
        </header>

        <main class="layout">
            <section class="content-stack">
                <section class="panel">
                    <div class="panel-heading">
                        <p class="eyebrow">Friends</p>
                        <h2>Victory Board</h2>
                    </div>
                    <div id="user-cards" class="user-grid"></div>
                </section>

                <section class="panel">
                    <div class="panel-heading">
                        <p class="eyebrow">Infernal Accounting</p>
                        <h2>Analytics</h2>
                    </div>
                    <div id="analytics" class="analytics-grid"></div>
                </section>

                <section class="panel">
                    <div class="panel-heading">
                        <p class="eyebrow">Latest Escapes</p>
                        <h2>Recent Runs</h2>
                    </div>
                    <div id="recent-runs" class="run-list"></div>
                </section>
            </section>
        </main>

        <button id="open-run-modal" class="floating-action" type="button">
            Add Run
        </button>

        <div id="run-modal" class="modal-backdrop" aria-hidden="true">
            <section
                class="panel victory-panel modal-panel"
                role="dialog"
                aria-modal="true"
                aria-labelledby="run-modal-title"
            >
                <div class="panel-heading">
                    <p class="eyebrow">Log a Victory</p>
                    <h2 id="run-modal-title">Add Run</h2>
                    <button id="close-run-modal" class="modal-close" type="button">
                        Close
                    </button>
                </div>

                <form id="run-form" class="run-form">
                    <label>
                        Access Code
                        <input
                            id="access-code"
                            name="access_code"
                            type="password"
                            autocomplete="off"
                            required
                        >
                    </label>

                    <div class="field-label">
                        <span>Realm</span>
                        <input id="side" name="side" type="hidden">
                        <div id="side-picker" class="asset-select"></div>
                    </div>

                    <div class="field-label">
                        <span>Weapon</span>
                        <input id="weapon" name="weapon" type="hidden">
                        <div id="weapon-picker" class="asset-select"></div>
                    </div>

                    <fieldset>
                        <legend>Primary Boons</legend>
                        <div id="boons" class="boon-grid"></div>
                    </fieldset>

                    <label>
                        Notes
                        <textarea
                            id="notes"
                            name="notes"
                            rows="3"
                            maxlength="500"
                            placeholder="Optional build notes, chaos, revenge..."
                        ></textarea>
                    </label>

                    <button type="submit">Record Victory</button>
                    <p id="form-status" class="status" aria-live="polite"></p>
                </form>
            </section>
        </div>

        <script src="/static/app.js"></script>
    </body>
</html>
